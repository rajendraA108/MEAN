<div class="page-container">

  <div class="custom-card">

    <h2 class="page-title mb-4">
      Add Product
    </h2>

    <form
      [formGroup]="form"
      (ngSubmit)="submit()"
    >

      <div class="mb-3">

        <label class="form-label">
          Product Title
        </label>

        <input
          type="text"
          class="form-control"
          formControlName="title"
          placeholder="Enter product title"
        />

      </div>

      <div class="mb-3">

        <label class="form-label">
          Description
        </label>

        <textarea
          class="form-control"
          formControlName="description"
          placeholder="Enter product description"
          rows="3"></textarea>


      </div>

      <div class="mb-3">

        <label class="form-label">
          Price
        </label>

        <input
          type="number"
          class="form-control"
          formControlName="price"
          placeholder="Enter product price"
        />

      </div>

      <div class="mb-4">

        <label class="form-label">
          Category
        </label>

        <input
          type="text"
          class="form-control"
          formControlName="category"
          placeholder="Enter product category"
        />

      </div>

      <div class="d-flex gap-2">

        <button
          type="submit"
          class="btn btn-success"
        >
          Add Product
        </button>

        <button
          type="button"
          class="btn btn-secondary"
          routerLink="/products"
        >
          Cancel
        </button>

      </div>

    </form>

  </div>

</div>
