<div class="auth-container">

  <div class="auth-card">

    <h2 class="auth-title">
      Welcome Back
    </h2>

    <form
      [formGroup]="form"
      (ngSubmit)="submit()"
    >

      <div class="mb-3">

        <label class="form-label">
          Email
        </label>

        <input
          type="email"
          class="form-control"
          formControlName="email"
          placeholder="Enter Email"
        />

      </div>

      <div class="mb-4">

        <label class="form-label">
          Password
        </label>

        <input
          type="password"
          class="form-control"
          formControlName="password"
          placeholder="Enter Password"
        />

      </div>

      <button
        class="btn btn-success btn-custom w-100"
      >
        Login
      </button>

    </form>

    <div class="text-center mt-4">
      <p class="mb-2">
        Don't have an account?
      </p>
      <a
        routerLink="/signup"
        class="btn btn-outline-primary btn-custom w-100"
      >
        Sign Up
      </a>
    </div>

  </div>

</div>
