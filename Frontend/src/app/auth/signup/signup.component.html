<div class="auth-container">

  <div class="auth-card">

    <h2 class="auth-title">
      Create Account
    </h2>

    <form
      [formGroup]="form"
      (ngSubmit)="submit()"
    >

      <div class="mb-3">

        <label class="form-label">
          Name
        </label>

        <input
          type="text"
          class="form-control"
          formControlName="name"
          placeholder="Enter Name"
        />

      </div>

      <div class="mb-3">

        <label class="form-label">
          Email
        </label>

        <input
          type="email"
          class="form-control"
          formControlName="email"
          placeholder="Enter Email"
        />

      </div>

      <div class="mb-4">

        <label class="form-label">
          Password
        </label>

        <input
          type="password"
          class="form-control"
          formControlName="password"
          placeholder="Enter Password"
        />

      </div>

      <button
        class="btn btn-primary btn-custom w-100"
      >
        Signup
      </button>

    </form>

  </div>

</div>
